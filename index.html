<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>중2 역사 퀴즈: 발해부터 삼별초까지</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --good: #16a34a;
      --bad: #dc2626;
      --accent: #2563eb;
      --accent-light: #dbeafe;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: white;
      padding: 28px 20px;
      text-align: center;
    }
    header h1 { margin: 0 0 8px; font-size: 26px; }
    header p { margin: 0; opacity: .9; }
    main { max-width: 880px; margin: 22px auto; padding: 0 14px 40px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, .06);
      margin-bottom: 16px;
    }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button, select {
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 13px;
      font-size: 15px;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 700;
    }
    button.ghost {
      background: var(--accent-light);
      border-color: #bfdbfe;
      color: #1d4ed8;
      font-weight: 700;
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      padding: 6px 10px;
      font-size: 13px;
      font-weight: 700;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .stat {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px;
      text-align: center;
    }
    .stat b { display: block; font-size: 21px; }
    .muted { color: var(--muted); font-size: 14px; }
    #questionBox h2 { margin: 10px 0 12px; font-size: 22px; }
    .options {
      display: grid;
      gap: 9px;
      margin: 16px 0;
    }
    .option {
      width: 100%;
      text-align: left;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: white;
      padding: 13px 14px;
      font-size: 16px;
    }
    .option:hover { border-color: #93c5fd; background: #eff6ff; }
    .option.selected { border-color: var(--accent); background: var(--accent-light); }
    .option.correct { border-color: var(--good); background: #dcfce7; }
    .option.wrong { border-color: var(--bad); background: #fee2e2; }
    .feedback {
      border-radius: 14px;
      padding: 13px 14px;
      margin-top: 10px;
      display: none;
    }
    .feedback.good { display: block; background: #dcfce7; border: 1px solid #86efac; color: #14532d; }
    .feedback.bad { display: block; background: #fee2e2; border: 1px solid #fecaca; color: #7f1d1d; }
    .explain {
      margin-top: 6px;
      color: #374151;
      font-size: 15px;
    }
    .wrong-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }
    details {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px 12px;
    }
    summary { cursor: pointer; font-weight: 700; }
    .hidden { display: none; }
    @media (max-width: 640px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      header h1 { font-size: 22px; }
      #questionBox h2 { font-size: 19px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>중2 역사 퀴즈: 발해부터 삼별초까지</h1>
    <p>발해의 발전 · 고려 건국 · 문벌 귀족 · 무신정권 · 몽골 침입 · 삼별초</p>
  </header>

  <main>
    <section class="card">
      <div class="row">
        <div>
          <span class="pill">학습 모드</span>
          <p class="muted">단원을 고르고 문제를 풀어 보세요. 틀린 문제는 자동으로 오답노트에 저장됩니다.</p>
        </div>
        <div>
          <select id="categorySelect" title="단원 선택">
            <option value="all">전체 범위</option>
            <option value="발해">발해</option>
            <option value="통일신라">통일신라</option>
            <option value="고려 건국">고려 건국</option>
            <option value="고려 제도">고려 제도</option>
            <option value="대외 관계">대외 관계</option>
            <option value="지배층의 갈등">지배층의 갈등</option>
			<option value="대외 관계">고려의 해외교류</option>
            <option value="무신정권">무신정권</option>
            <option value="몽골 침입·삼별초">몽골 침입·삼별초</option>
          </select>
        </div>
      </div>
      <div class="controls">
        <button class="primary" onclick="startQuiz()">퀴즈 시작 / 다시 섞기</button>
        <button class="ghost" onclick="startWrongOnly()">오답만 다시 풀기</button>
        <button onclick="resetAll()">기록 초기화</button>
      </div>
    </section>

    <section class="card">
      <div class="stats">
        <div class="stat"><span class="muted">현재 문제</span><b id="currentNum">0</b></div>
        <div class="stat"><span class="muted">전체 문제</span><b id="totalNum">0</b></div>
        <div class="stat"><span class="muted">정답</span><b id="correctNum">0</b></div>
        <div class="stat"><span class="muted">오답</span><b id="wrongNum">0</b></div>
      </div>
    </section>

    <section id="questionBox" class="card">
      <span id="categoryPill" class="pill">대기 중</span>
      <h2 id="questionText">퀴즈 시작 버튼을 눌러 주세요.</h2>
      <div id="options" class="options"></div>
      <div id="feedback" class="feedback"></div>
      <div class="controls">
        <button id="checkBtn" class="primary" onclick="checkAnswer()" disabled>정답 확인</button>
        <button id="nextBtn" onclick="nextQuestion()" disabled>다음 문제</button>
      </div>
    </section>

    <section class="card">
      <h2 style="margin-top:0;">오답노트</h2>
      <p class="muted">틀린 문제는 여기에 쌓입니다. 다시 맞히면 자동으로 유지되지는 않으니, 필요하면 기록 초기화를 눌러 주세요.</p>
      <div id="wrongList" class="wrong-list"></div>
    </section>
  </main>

  <script>
    const questions = [
      {cat:"발해", q:"발해를 건국한 인물은?", a:"대조영", opts:["왕건","대조영","궁예","견훤"], exp:"발해는 698년 대조영이 고구려 유민과 말갈 세력을 기반으로 세웠다."},
	  {cat:"발해", q:"무왕의 업적이 아닌 것은?", a:"당의 문물을 받아들여 중앙과 지방의 통치 체제를 정비했다", opts:["독자적인 연호를 사용했다.", "옛 고구려와 부여 땅 대부분을 차지했다", "일본과 친선관계를 맺었다", "당의 문물을 받아들여 중앙과 지방의 통치 체제를 정비했다"], exp:"무왕은 당과 대립했다."},
      {cat:"발해", q:"무왕 때 발해가 당을 견제하며 공격한 지역은?", a:"산둥 반도", opts:["요동 지방","산둥 반도","한강 유역","동북 9성"], exp:"무왕은 장문휴를 보내 당의 산둥 반도를 공격했다."},
      {cat:"발해", q:"무왕의 대외 정책으로 알맞은 것은?", a:"당과 대립하고 일본과 교류했다.", opts:["당과만 친선 관계를 맺었다.","당과 대립하고 일본과 교류했다.","신라에 항복했다.","거란과 연합했다."], exp:"무왕은 당과 대립하면서 일본과 교류해 당을 견제했다."},
      {cat:"발해", q:"문왕 때의 특징으로 알맞은 것은?", a:"당과 친선 관계를 회복하고 제도를 정비했다.", opts:["몽골과 강화했다.","당과 친선 관계를 회복하고 제도를 정비했다.","무신정변을 일으켰다.","후삼국을 통일했다."], exp:"문왕은 당의 제도와 문화를 받아들이며 발해의 통치 체제를 정비했다."},
	  {cat:"발해", q:"당은 발해의 전성기에 '바다 동쪽의 융성한 나라'라고 뜻의 (------)라고 불렀다.", opts:["해동성국","정동행성","성동격서","동방예의지국"], exp:"해동성국은 발해를 대표하는 호칭이다."},
      {cat:"발해", q:"발해가 전성기를 맞아 '해동성국'이라 불린 시기의 왕은?", a:"선왕", opts:["무왕","문왕","선왕","성종"], exp:"선왕 때 발해는 영토를 크게 넓히고 전성기를 맞아 해동성국이라 불렸다."},
	  {cat:"발해", q:"발해의 교육기관은?", a:"주자감", opts:["국학", "주자감", "국자감", "태학"], exp:"태학(고구려), 국학(통일신라), 주자감(발해), 국자감(고려), 성균관(고려말~조선)"},
      {cat:"발해", q:"발해의 중앙 정치 제도는?", a:"3성 6부", opts:["2성 6부","3성 6부","5도 양계","교정도감"], exp:"발해는 당의 제도를 참고해 3성 6부 체제를 운영했다."},
	  {cat:"발해", q:"발해의 지방 행정 구역은?", a:"15부", opts:["2성 6부", "3성 6부", "15부", "5경"], exp:"발해는 전국을 15부로 나누고 부 아래 주를 설치하여 지방관을 파견했다."},
      {cat:"발해", q:"발해를 멸망시킨 나라는?", a:"요(거란)", opts:["금","당","요(거란)","몽골"], exp:"발해는 926년 요(거란)의 공격으로 멸망했다."},
	  {cat:"발해", q:"발해의 가장 오랜 기간 수도는?", a:"상경성", opts:["중경성","상경성","장안성","국내성"], exp:"상경성은 당의 장안성을 모방해 지었다"},
	  {cat:"발해", q:"당의 산둥반도에 설치된 발해인 숙소는?", a:"발해관", opts:["발해관","발해방","신라관","신라방"], exp:"발해관은 당의 산둥반도에 설치되었다."},
	  {cat:"발해", q:"발해가 넓은 영토를 관리하고 외교와 교역을 하기 위해 설치한 것은?", a:"발해5도", opts:["5경","발해5도","발해관","동북9성"], exp:"발해에는 넓은 영토를 연결하는 주요 교통로인 발해 5도가 있었다."},
	  {cat:"발해", q:"발해 성터에서 발견된 것으로, 중앙아시아와 교류했음을 입증하는 유물은?", a:"소그드 은화", opts:["십자가를 목에 걸고 있는 불상", "삼채 향로", "정효 공주 묘", "소그드 은화"], exp:"8세기 중앙아시아에 살았던 소그드인이 만든 은화이다"},
	  {cat:"발해", q:"발해 문화 유물 중 고구려 양식을 계승한 것은?", a:"이불병좌상", opts:["이불병좌상", "말갈계 토기", "삼채 향로", "영광탑"], exp:"이불병좌상은 두 명의 부처가 나란히 앉은 불상이다"},
	  {cat:"발해", q:"발해 문화 유물 중 고구려 문화 영향이 아닌 것은?", a:"삼채 향로", opts:["쪽구들", "이불병좌상", "돌무덤", "삼채 향로"], exp:"삼채 향로는 당의 삼채 기법을 받아들여 세 가지 색의 유약을 입혔다."},
	  {cat:"발해", q:"발해 문화 유물 중 당 문화 영향이 아닌 것은?", a:"이불병좌상", opts:["정효 공주 묘", "영광탑", "이불병좌상", "삼채 향로"], exp:"삼채 향로는 당의 삼채 기법을 받아들여 세 가지 색의 유약을 입혔다."},
	  
	  {cat:"통일신라", q:"당의 외국인 대상 관리 선발 시험은?", a:"빈공과", opts:["과거제","빈공과","신라방","발해관"], exp:"당의 빈공과는 외국인을 대상으로 한 관리 선발 시험이다"},
	  {cat:"통일신라", q:"통일신라에서 당의 빈공과에 합격한 대표적 인물은?", a:"최치원", opts:["오소도","김부식","최치원","대봉예"], exp:"872년 발해의 오소도가 빈공과에 수석합격하였고, 2년 뒤 신라의 최치원이 수석합격하였다. 대봉예는 당에 사신으로 간 발해의 왕자이다."},
	  {cat:"통일신라", q:"8세기 후반 진골 귀족의 반란으로 살해된 왕은?", a:"혜공왕", opts:["경순왕","문무왕","혜공왕","흥덕왕"], exp:"혜공왕이 살해된 후 왕위 계승 싸움이 잇다라 일어나 150년간 왕이 20명이나 바뀌었다"},
	  {cat:"통일신라", q:"신라 후반 귀족들이 부를 쌓고자 부활시킨 제도는?", a:"녹읍", opts:["사병 해체","녹읍","6두품","사치품 폐지"], exp:"녹읍으로 부를 쌓아 사병까지 운영했다"},
	  {cat:"통일신라", q:"신라 후반 귀족을 견제한 왕과 그 제도가 아닌 것은?", a:"골품제 폐지", opts:["흥덕왕", "사치품 금지령", "지방 촌주를 4~5두품으로 대우", "골품제 폐지"], exp:"신라는 골품제의 한계를 극복하지 못했다"},
	  {cat:"통일신라", q:"신라 후반 지방에서 새로이 나타난 세력은?", a:"호족", opts:["호족","문벌","권문세족","6두품"], exp:"지방 호족이 등장하여 골품제에 불만인 6두품과 손을 잡았다."},
	  {cat:"통일신라", q:"신라 후반 일어난 농민 봉기는?", a:"원종과 애노의 난", opts:["삼별초의 난", "원종과 애노의 난", "김헌창의 난", "묘청의 난"], exp:"김헌창은 왕위를 쟁탈한 진골 귀족이다."},
	  {cat:"통일신라", q:"당의 주요 항구에 만들어진 신라인 거주지는?", a:"신라방", opts:["발해관","발해방","신라관","신라방"], exp:"신라방은 당의 주요 항구에 만들어졌다."},
	  {cat:"통일신라", q:"통일 신라의 주요 유물 중 일본과 관련된 유물은?", a:"경주 월지 금동 초심지 가위", opts:["경주 월지 금동 초심지 가위","원성왕릉 무인석", "불국사 삼층 석탑", "석굴암"], exp:"유사한 가위가 일본 고툐 쇼소인에서 발견됐다."},

	  {cat:"고려의 해외교류", q:"고려의 무역품 중 송으로부터 들여온 수입품은?", a:"비단, 차, 도자기, 서적", opts:["비단, 차, 도자기, 서적","금, 은, 인삼","말, 모피","수은, 향신료"], exp:"중국 송나라로부터 선진 문물을 수입하였다"},
	  {cat:"고려의 해외교류", q:"고려의 무역품 중 거란, 여진에 판매한 수출품은?", a:"농기구, 곡식", opts:["금, 은, 인삼","말, 모피","유황, 수은","농기구, 곡식"], exp:"중국 송나라로부터 선진 문물을 수입하였다"},
	  {cat:"고려의 해외교류", q:"고려의 무역품 중 아랍과 거래한 물품이 아닌 것은?", a:"인삼", opts:["비단","수은","향신료","인삼"], exp:"고려는 아랍에 금과 비단을 수출하고 수은과 향신료를 수입하였다."},
	  {cat:"고려의 해외교류", q:"고려와 거란이 국교를 수립한 이후 (---)으로 화려하게 꾸미는 것이 고려 사회에 유행했다.", a:"거란풍", opts:["거란풍","사치풍","귀족풍","몽골풍"], exp:"거란풍으로 수레, 가마, 의복 등을 화려하게 꾸몄다"},
	  	  
      {cat:"무신정권", q:"무신정변의 배경으로 가장 알맞은 것은?", a:"문신 중심 사회에서 무신이 차별받았다.", opts:["발해 유민이 반란을 일으켰다.","문신 중심 사회에서 무신이 차별받았다.","몽골이 고려에 쳐들어왔다.","고려가 후삼국을 통일했다."], exp:"문벌 귀족 사회의 모순과 무신 차별이 무신정변의 중요한 배경이다."},
	  {cat:"무신정권", q:"무신정변을 시작한 무신은 누구인가?", a:"정중부", opts:["이소응","정중부","최충헌","이의민"], exp:"이의방, 정중부 등이 정변을 일으켜 수많은 문신을 죽이고 의종을 폐위시켰다(1170),"},
	  {cat:"무신정권", q:"최씨 무신정권 이전의 무신들의 회의 기구는?", a:"중방", opts:["상서성","어사대","중방","국자감"], exp:"무신들은 중방에서 나라의 중요한 일을 결정했으며 이후 최씨 정권에서 교정도감, 정방 등이 설치되었다."},
      {cat:"무신정권", q:"최씨 무신정권의 최고 권력 기구는?", a:"교정도감", opts:["교정도감","상서성","어사대","중추원"], exp:"최충헌은 교정도감을 설치하여 권력을 장악했다."},
      {cat:"무신정권", q:"최씨 무신정권에서 인사권을 담당한 기구는?", a:"정방", opts:["정방","도방","서방","삼사"], exp:"정방은 관리 임명 등 인사 행정을 담당했다."},
      {cat:"무신정권", q:"무신정권 시기 노비 신분 해방을 꿈꾸며 일어난 사건은?", a:"만적의 난", opts:["만적의 난","묘청의 난","이자겸의 난","홍경래의 난"], exp:"만적은 최충헌의 노비였던 자로서, 만적의 난은 무신정권 시기 신분 해방 의식이 나타난 사건이다."},
	  {cat:"무신정권", q:"무신정권 시기 향/소/부곡의 차별대우에 반기를 든 사건은?", a:"망이,망소이의 난", opts:["만적의 난","망이,망소이의 난","김사미의 난","효심의 난"], exp:"망이,망소이 형제는 향/소/부곡 중의 한 곳인 공주 명학소에서 난을 일으켰다. 김사미, 효심은 농민 봉기를 일으켰다."},

      {cat:"몽골 침입·삼별초", q:"몽골 침입 때 고려 조정이 수도를 옮긴 곳은?", a:"강화도", opts:["진도","제주도","강화도","서경"], exp:"최우 정권은 몽골 기병이 섬 공격에 불리하다는 점을 이용해 강화도로 천도했다."},
      {cat:"몽골 침입·삼별초", q:"몽골 장수 살리타가 전사한 전투는?", a:"처인성 전투", opts:["처인성 전투","귀주대첩","충주성 전투","황산벌 전투"], exp:"처인성 전투에서 김윤후 등이 활약했고 몽골 장수 살리타가 전사했다."},
	  {cat:"몽골 침입·삼별초", q:"처인성과 충주성에서 몽골군과 싸운 사람은?", a:"김윤후", opts:["김부식","강감찬","양규","김윤후"], exp:"김윤후는 처인성에서 처인부곡 백성과 함께 몽골 장수 살리타를 사살했고, 이후 충주성에서 노비와 함께 몽골군을 물리쳤다."},
      {cat:"몽골 침입·삼별초", q:"몽골 침입을 물리치고 나라를 지키려는 마음으로 만든 문화유산은?", a:"팔만대장경", opts:["직지심체요절","팔만대장경","무구정광대다라니경","첨성대"], exp:"팔만대장경은 몽골 침입 시기 불교의 힘으로 나라를 지키려는 염원을 담아 조판되었다."},
      {cat:"몽골 침입·삼별초", q:"삼별초 항쟁의 이동 순서로 맞는 것은?", a:"강화도 → 진도 → 제주도", opts:["강화도 → 진도 → 제주도","진도 → 강화도 → 제주도","제주도 → 강화도 → 진도","개경 → 서경 → 강화도"], exp:"삼별초는 강화도에서 봉기한 뒤 진도, 제주도로 이동하며 항쟁했다."},
      {cat:"몽골 침입·삼별초", q:"삼별초가 항쟁한 주된 이유는?", a:"고려 조정의 몽골과의 강화와 개경 환도에 반대했기 때문이다.", opts:["발해를 다시 세우기 위해서","고려 조정의 몽골과의 강화와 개경 환도에 반대했기 때문이다.","과거제 폐지를 요구했기 때문이다.","후백제 부흥을 위해서"], exp:"삼별초는 고려 정부가 몽골과 강화하고 개경으로 돌아가려 하자 이에 반대했다."},
	  {cat:"몽골 침입·삼별초", q:"고려 왕실이 몽골과 협상한 이후 행한 일은?", a:"몽골 공주와 혼인", opts:["서경 천도","몽골 공주와 혼인","강화도 천도","동북 9성 건축"], exp:"원 황실의 부마가 된 충렬왕은 원을 이용해 왕권을 강화하려 했다."},
	  {cat:"몽골 침입·삼별초", q:"원이 고려 정치에 간섭하고자 행한 일이 아닌 것은?", a:"고려 공주와 혼인하였다.", opts:["일본 원정을 위해 정동행성을 설치하였다.","금,은,인삼,매 등 각종 특산물을 요구하였다.","여성들을 공녀로 끌고 갔다.","고려 공주와 혼인하였다."], exp:"고려 왕을 몽골 공주와 혼인시켰다."},
	  {cat:"몽골 침입·삼별초", q:"원이 일본 원정을 위해 설치한 것은?", a:"정동행성", opts:["동북 9성","강동 6주","정동행성","동녕부"], exp:"원은 일본 원정을 위해 정동행성을 설치하였다."},
	  {cat:"몽골 침입·삼별초", q:"원이 고려 영토의 일부를 지배하기 위해 설치한 기관이 아닌 것은?", a:"웅진도독부", opts:["쌍성총관부","동녕부","탐라총관부","웅진도독부"], exp:"웅진도독부는 백제 멸망 후 당이 설치한 관청이다."},
	  {cat:"몽골 침입·삼별초", q:"고려가 원으로부터 받아들인 문물이 아닌 것은?", a:"도자기", opts:["목화(면화)","농업 기술","화약 제조술","도자기"], exp:"도자기는 송 때에도 이미 주요 수입품이었다."},
	  {cat:"몽골 침입·삼별초", q:"원으로부터 목화(면화)를 들여온 인물은?", a:"문익점", opts:["최무선","최충헌","문익점","김부식"], exp:"문익점이 목화씨를 숨겨들여와 널리 보급했다."},
	  {cat:"몽골 침입·삼별초", q:"원으로부터 화약 제조술을 들여온 인물은?", a:"최무선", opts:["최무선","최충헌","문익점","김부식"], exp:"최무선은 화약 제조술을 들여와 왜구를 물리쳤다."},
	  {cat:"몽골 침입·삼별초", q:"다음 중 원의 풍습인 몽골풍이 아닌 것은?", a:"저고리", opts:["변발", "철릭", "소주", "저고리"], exp:"원에도 고려의 옷(저고리, 치마)과 모자, 신발 등이 유행하고 쌈 음식이나 떡과 같은 먹을거리도 전해졌다."},
	  {cat:"몽골 침입·삼별초", q:"원에 유행한 고려의 풍습을 일컫는 말은?", a:"고려양", opts:["몽골풍","거란풍","고려양","고려장"], exp:"원에 끌려간 여성들을 중심으로 전해진 고려의 풍습을 고려양이라고 한다."},
    ];

    let pool = [];
    let index = 0;
    let selected = null;
    let correct = 0;
    let wrong = 0;
    let answered = false;
    let wrongNotes = JSON.parse(localStorage.getItem("historyWrongNotes") || "[]");

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function startQuiz() {
      const cat = document.getElementById("categorySelect").value;
      pool = questions.filter(x => cat === "all" || x.cat === cat);
      pool = shuffle(pool);
      index = 0; correct = 0; wrong = 0;
      renderQuestion();
      renderStats();
    }

    function startWrongOnly() {
      if (wrongNotes.length === 0) {
        alert("아직 오답노트에 문제가 없습니다.");
        return;
      }
      const ids = new Set(wrongNotes.map(x => x.q));
      pool = shuffle(questions.filter(x => ids.has(x.q)));
      index = 0; correct = 0; wrong = 0;
      renderQuestion();
      renderStats();
    }

    function renderQuestion() {
      selected = null;
      answered = false;
      const q = pool[index];
      const options = document.getElementById("options");
      const feedback = document.getElementById("feedback");
      feedback.className = "feedback";
      feedback.innerHTML = "";
      document.getElementById("checkBtn").disabled = true;
      document.getElementById("nextBtn").disabled = true;

      if (!q) {
        document.getElementById("categoryPill").textContent = "완료";
        document.getElementById("questionText").textContent = "퀴즈가 끝났습니다.";
        options.innerHTML = `<p class="muted">정답 ${correct}개, 오답 ${wrong}개입니다. 다시 풀려면 위의 버튼을 눌러 주세요.</p>`;
        renderStats();
        renderWrongList();
        return;
      }

      document.getElementById("categoryPill").textContent = q.cat;
      document.getElementById("questionText").textContent = q.q;
      const shuffledOpts = shuffle(q.opts);
      options.innerHTML = "";
      shuffledOpts.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.textContent = opt;
        btn.onclick = () => {
          if (answered) return;
          document.querySelectorAll(".option").forEach(b => b.classList.remove("selected"));
          btn.classList.add("selected");
          selected = opt;
          document.getElementById("checkBtn").disabled = false;
        };
        options.appendChild(btn);
      });
      renderStats();
    }

    function checkAnswer() {
      if (!selected || answered) return;
      answered = true;
      const q = pool[index];
      const isCorrect = selected === q.a;
      const feedback = document.getElementById("feedback");

      document.querySelectorAll(".option").forEach(btn => {
        if (btn.textContent === q.a) btn.classList.add("correct");
        else if (btn.textContent === selected) btn.classList.add("wrong");
      });

      if (isCorrect) {
        correct++;
        feedback.className = "feedback good";
        feedback.innerHTML = `<b>정답!</b><div class="explain">${q.exp}</div>`;
      } else {
        wrong++;
        feedback.className = "feedback bad";
        feedback.innerHTML = `<b>오답.</b> 정답은 <b>${q.a}</b>입니다.<div class="explain">${q.exp}</div>`;
        addWrong(q);
      }

      document.getElementById("checkBtn").disabled = true;
      document.getElementById("nextBtn").disabled = false;
      renderStats();
      renderWrongList();
    }

    function nextQuestion() {
      index++;
      renderQuestion();
    }

    function addWrong(q) {
      if (!wrongNotes.some(x => x.q === q.q)) {
        wrongNotes.push({cat:q.cat, q:q.q, a:q.a, exp:q.exp});
        localStorage.setItem("historyWrongNotes", JSON.stringify(wrongNotes));
      }
    }

    function renderWrongList() {
      const box = document.getElementById("wrongList");
      if (wrongNotes.length === 0) {
        box.innerHTML = `<p class="muted">아직 틀린 문제가 없습니다.</p>`;
        return;
      }
      box.innerHTML = wrongNotes.map((x, i) => `
        <details>
          <summary>${i + 1}. [${x.cat}] ${x.q}</summary>
          <p><b>정답:</b> ${x.a}</p>
          <p class="muted">${x.exp}</p>
        </details>
      `).join("");
    }

    function renderStats() {
      document.getElementById("currentNum").textContent = pool.length ? Math.min(index + 1, pool.length) : 0;
      document.getElementById("totalNum").textContent = pool.length;
      document.getElementById("correctNum").textContent = correct;
      document.getElementById("wrongNum").textContent = wrong;
    }

    function resetAll() {
      if (!confirm("점수와 오답노트를 초기화할까요?")) return;
      wrongNotes = [];
      localStorage.removeItem("historyWrongNotes");
      correct = 0; wrong = 0; index = 0; pool = [];
      document.getElementById("categoryPill").textContent = "대기 중";
      document.getElementById("questionText").textContent = "퀴즈 시작 버튼을 눌러 주세요.";
      document.getElementById("options").innerHTML = "";
      document.getElementById("feedback").className = "feedback";
      document.getElementById("feedback").innerHTML = "";
      renderStats();
      renderWrongList();
    }

    renderStats();
    renderWrongList();
  </script>
</body>
</html>
